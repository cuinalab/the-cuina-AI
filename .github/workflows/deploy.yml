name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run build

      - name: Deploy via SFTP
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "dist/"
          REMOTE_HOST: ${{ secrets.FTP_SERVER }}
          REMOTE_USER: ${{ secrets.FTP_USERNAME }}
          TARGET: /home/u487495715/domains/thecuina.com/public_html/
          REMOTE_PORT: 65002
          SSH_CMD_ARGS: "-o StrictHostKeyChecking=no"

          
      - name: Test SSH connection
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/test_key
          chmod 600 /tmp/test_key
          ssh -i /tmp/test_key -p 65002 -o StrictHostKeyChecking=no ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} "echo 'SSH OK'"
          rm /tmp/test_key
