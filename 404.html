<!DOCTYPE html>
<html lang="es">
<head>

<body class="flex flex-col min-h-screen font-sans antialiased">

        <div class="container mx-auto px-4">
            <p>&copy; 2026 The Cuina AI. Soluciones de Inteligencia Artificial para Empresas.</p>
